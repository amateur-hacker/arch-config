source = $HOME/.config/hypr/themes/mocha.conf

$primary = $lavender
$surface = $base
$secondary = rgb(f5bde6)
$error = $red
$tertiary = rgb(c6a0f6)
$surface_lowest = rgb(212232)

dwindle {
  pseudotile = true
  preserve_split = true
  force_split = 2
}

master {
  new_status = master
  new_on_top = true
  mfact = 0.5
  # new_on_active = after
  # slave_count_for_center_master = 0
}

general {
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  col.active_border = $primary
  col.inactive_border = $surface
  layout = master
  resize_on_border = false
  no_focus_fallback = true
  allow_tearing = false
  snap {
      enabled = true
      window_gap = 4
      monitor_gap = 5
      respect_gaps = true
  }
}

decoration {
  rounding = 18
  rounding_power = 2.4

  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0

  blur {
    enabled = true
    size = 10
    passes = 3
    brightness = 1
    noise = 0.05
    contrast = 0.89
    xray = true
    special = false
    new_optimizations = true
    popups = false
    popups_ignorealpha = 0.6
    input_methods = true
    input_methods_ignorealpha = 0.8
  }

  shadow {
    enabled = true
    range = 50
    offset = 0 4
    render_power = 10
    color = rgba(00000050)
  }

  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.8
}

group {
  col.border_active = $secondary
  col.border_inactive = $surface
  col.border_locked_active = $error
  col.border_locked_inactive = $surface

  groupbar {
    font_size = 12
    font_family = monospace
    font_weight_active = ultraheavy
    font_weight_inactive = normal

    indicator_height = 0
    indicator_gap = 4
    height = 22
    gaps_in = 4
    gaps_out = 0

    col.active = $secondary
    col.inactive = $surface
    col.locked_active = $error
    col.locked_inactive = $surface
    text_color = $base
    text_color_inactive = rgba($textAlpha90)

    gradients = true
    gradient_rounding = 10
    gradient_round_only_edges = false
  }
}

animations {
  enabled = yes

  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = liner, 1, 1, 1, 1
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.5, 0, 0.99, 0.99
  bezier = smoothIn, 0.5, -0.5, 0.68, 1.5

  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 5, winIn, slide
  animation = windowsOut, 1, 3, smoothOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, liner
  animation = borderangle, 1, 30, liner, once
  # animation = borderangle, 1, 180, liner, loop
  animation = fade, 1, 3, smoothOut
  animation = workspaces, 1, 5, overshot

  # animation = workspacesIn, 1, 5, winIn, slide
  # animation = workspacesOut, 1, 5, winOut, slide
}

input {
  kb_layout = us
  # kb_options = caps:escape # ctrl:nocaps caps:swapescape
  # kb_options = ctrl:swap_rwin_rctl
  natural_scroll = true
  numlock_by_default = true
  repeat_delay = 250
  repeat_rate = 35

  follow_mouse = 1
  off_window_axis_events = 2
  # focus_on_close = true

  touchpad {
    natural_scroll = true
    disable_while_typing = true
    clickfinger_behavior = true
    tap-to-click = true
    scroll_factor = 0.7
   }
}

device {
    name = compx-2.4g-receiver-1
    kb_options = ctrl:swap_rwin_rctl
    # kb_options = altwin:swap_alt_win
}

gesture = 3, horizontal, workspace
gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vfr = 1
  vrr = 1
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  enable_swallow = true
  swallow_regex = ^(kitty|com.mitchellh.ghostty|org.wezfurlong.wezterm|foot|Alacritty)$
  allow_session_lock_restore = true
  focus_on_activate = true
}

cursor {
  default_monitor = HDMI-A-1
  hide_on_key_press = true
  warp_on_change_workspace = 1
  # persistent_warps = true
}

ecosystem {
  no_update_news = true
  no_donation_nag = true
}

xwayland {
  force_zero_scaling = true
}

binds {
  hide_special_on_workspace_change = true
}
