windowrule = match:class ^(timeshift-gtk|org.gnome.World.PikaBackup)$, tag +settings

# start apps on specific workspaces
windowrule = match:tag code_editor, workspace 1
windowrule = match:tag second_brain, workspace 1
windowrule = match:tag browser, workspace 2
windowrule = match:tag file_manager, workspace 3
windowrule = match:tag file_transfer, workspace 3
windowrule = match:tag document_viewer, workspace 4
windowrule = match:tag system_monitor, workspace 4
windowrule = match:tag image_editor, workspace 5
windowrule = match:tag video_editor, workspace 5
windowrule = match:tag messenger, workspace 6
windowrule = match:tag email, workspace 6
windowrule = match:tag music_player, workspace 7
windowrule = match:tag games, workspace 8
windowrule = match:tag gamestore, workspace 8
windowrule = match:tag screenshare, workspace 9 silent
windowrule = match:class ^(virt-manager)$, workspace 10 silent
windowrule = match:class ^(.virt-manager-wrapped)$, workspace 10 silent

# some special override rules
windowrule = match:tag image_viewer, no_blur on
windowrule = match:tag image_viewer, opacity 1.0
windowrule = match:tag image_editor, no_blur on
windowrule = match:tag image_editor, opacity 1.0
windowrule = match:tag video_editor, no_blur on
windowrule = match:tag video_editor, opacity 1.0
windowrule = match:tag media_player, no_blur on
windowrule = match:tag media_player, opacity 1.0

# windowrule to avoid idle for fullscreen apps
windowrule = match:fullscreen true, idle_inhibit fullscreen
windowrule = idle_inhibit fullscreen, match:fullscreen 1
windowrule = idle_inhibit fullscreen, match:class ^(*)$
windowrule = idle_inhibit fullscreen, match:title ^(*)$

# fullscreen preset
windowrule = match:tag media_player, fullscreen on
windowrule = match:tag image_viewer, fullscreen on

# float, center and size
windowrule = match:tag wallpaper_manager, float on, center on, size (monitor_w*0.6) (monitor_h*0.6)
windowrule = match:tag settings, float on, center on, size (monitor_w*0.6) (monitor_h*0.6)
windowrule = match:tag calculator, float on, center on, size (monitor_w*0.6) (monitor_h*0.6)


# popups and dialogue
windowrule = match:title ^(Authentication Required)$, float on, center on
windowrule = match:class ^(confirm|dialog|download|notification|error|splash|confirmreset)$, float on, center on, size (monitor_w*0.6) (monitor_h*0.6)
windowrule = match:class ^(com.heroicgameslauncher.hgl)$ match:title negative:(Heroic Games Launcher), float on
windowrule = match:class ^([Ss]team)$ match:title negative:^([Ss]team)$, float on
windowrule = match:title ^(Open File(s)|Save File|branchdialog|.*wants to save.*|.*wants to open.*)$, float on, center on, size (monitor_w*0.6) (monitor_h*0.6)
windowrule = match:title ^(Add Folder to Workspace)$, float on, center on, size (monitor_w*0.6) (monitor_h*0.6)
windowrule = match:title ^(SDDM Background)$, float on, center on, size (monitor_w*0.16) (monitor_h*0.12)
windowrule = match:class ^(yad)$, float on, center on, size (monitor_w*0.2) (monitor_h*0.2)
windowrule = match:class ^(hyprland-donate-screen)$, float on, center on

# blur & fullscreen
windowrule = match:tag games, no_blur on, fullscreen 0
windowrule = match:tag games, fullscreen 0

# opacity
windowrule = match:tag terminal, opacity 0.8 0.8
windowrule = match:tag second_brain, opacity 0.8 0.8
windowrule = match:tag file_manager, opacity 0.8 0.8
windowrule = match:tag document_viewer, opacity 0.8 0.8
windowrule = match:tag music_player, opacity 0.8 0.8
windowrule = match:tag messenger, opacity 0.8 0.8

# This not gonna take the focus to the window that appears when
# hovering over some of the parts of the IntelliJ Products
windowrule = match:class ^(jetbrains-*), no_initial_focus on
windowrule = match:title ^(wind.*)$, no_initial_focus on

# named rules for special cases
windowrule {
    name = Whatsapp-zapzap
    match:class = ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
    size = (monitor_w*0.6) (monitor_h*0.7)
    center = on
}
windowrule {
    name = Picture-in-Picture
    match:title = ^(Picture-in-Picture)$
    float = on
    move = 72% 7%
    opacity = 0.95 0.75
    pin = on
    keep_aspect_ratio = on
    size = (monitor_w*0.3) (monitor_h*0.3)
}
windowrule {
    name = Thunar-Progress-bar
    match:class = ^(thunar)$
    match:title = ^(File Operation Progress)$
    float = on
    center = on
    size = (monitor_w*0.26) (monitor_h*0.18)
}
windowrule {
    name = suppress_maximize_events
    match:class = .*

    suppress_event = maximize
}
windowrule {
    name = fix_xwayland_drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# layer rules
layerrule = match:namespace rofi, blur on
layerrule = match:namespace notifications, blur on
layerrule = match:namespace selection, no_anim on
layerrule = match:namespace quickshell:overview, blur on
layerrule = match:namespace quickshell:overview, ignore_alpha 0.5

# Noctalia shell specific
layerrule {
  name = noctalia_background_blur
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
layerrule {
  name = noctalia_region_selector_no_anim
  match:namespace = noctalia-shell:regionSelector
  no_anim = on
}

