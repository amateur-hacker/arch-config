# Setting variables
$superMod = SUPER
$altMod = ALT
$scriptsDir = $HOME/.config/hypr/scripts
$submapReset = hyprctl dispatch submap reset
$normalScreenshot = grim -g "$(slurp -o -r -c '##f38ba8ff')" -t ppm - | satty --filename - --fullscreen --output-filename ~/pictures/screenshots/screenshot-$(date '+%d-%b-%y_%Ih%Mm%Ss%p').png

$browser = $BROWSER
$fileManager = nautilus
$textEditor = neovide
$messenger = Telegram
$musicPlayer = spotify
$terminal = $TERMINAL

$ipc = qs -c noctalia-shell ipc call
$audioControl = $ipc volume openPanel
$bluetoothManager = $ipc bluetooth togglePanel
$controlCenter = $ipc controlCenter toggle
$lockScreen = $ipc lockScreen lock
$networkPanel = $ipc network togglePanel
$notificationPanel = $ipc notifications toggleHistory
$sessionMenu = $ipc sessionMenu toggle
$systemMonitor = $ipc systemMonitor toggle
$systemSettings = $ipc settings toggle

# Scripts Variables
$airplaneMode = $scriptsDir/airplane-mode.sh
$screenshot = $scriptsDir/screenshot.sh
$refresh = $scriptsDir/refresh.sh
$floatPreset = $scriptsDir/float-preset.sh
$floatAllPreset = $scriptsDir/floatall-preset.sh
$cycleFloat = $scriptsDir/cycle-float.sh
$toggleMechSound = $scriptsDir/toggle-mech-sound.sh

# Core binds
# bind = SUPER, S, exec, $ipc controlCenter toggle
