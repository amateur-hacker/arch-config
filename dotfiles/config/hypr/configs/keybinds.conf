$superMod = SUPER
$altMod = ALT

$scriptsDir = $HOME/.config/hypr/scripts
$submapReset = hyprctl dispatch submap reset

$browser = $BROWSER
$fileManager = nautilus
$codeEditor = neovide
$messagingApp = Telegram
$songApp = spotify
$terminal = $TERMINAL
$colorPicker = hyprpicker -a

$ipc = qs -c noctalia-shell ipc call
$brightness = $ipc brightness
$volume = $ipc volume
$media = $ipc media
$lockScreen = $ipc lockScreen lock
$toggleAudioControl = $ipc volume togglePanel
$toggleBluetoothManager = $ipc bluetooth togglePanel
$toggleIdleInhibitor = $ipc idleInhibitor toggle
$toggleCalendar = $ipc calendar toggle
$toggleControlCenter = $ipc controlCenter toggle
$toggleLauncher = $ipc launcher toggle
$toggleNetworkPanel = $ipc network togglePanel
$toggleNotificationPanel = $ipc notifications toggleHistory
$toggleSessionMenu = $ipc sessionMenu toggle
$toggleSystemMonitor = $ipc systemMonitor toggle
$toggleSystemSettings = $ipc settings toggle
$toggleWallpaperPicker = $ipc wallpaper toggle
$toggleVideoRecording = $ipc plugin:screen-recorder toggle
# $toggleShowKeys = $ipc plugin:show-keys toggle

$toggleAirplaneMode = $scriptsDir/airplane-mode.sh
$screenshot = $scriptsDir/screenshot.sh
$refresh = $scriptsDir/refresh.sh
$toggleFloating = $scriptsDir/toggle-floating.sh
$toggleAllFloating = $scriptsDir/toggle-all-floating.sh
$toggleFloatTileFocus = $scriptsDir/toggle-float-tile-focus.sh
$toggleMechSound = $scriptsDir/toggle-mech-sound.sh
$toggleShowKeys = $scriptsDir/toggle-showkeys.sh
$OCRSelect = $scriptsDir/ocr-select.sh


#1.Hardware
bindel = , XF86AudioRaiseVolume, exec, $volume increase #"Increase volume"
bindel = , XF86AudioLowerVolume, exec, $volume decrease #"Decrease volume"
bindl = , XF86AudioMute, exec, $volume muteOutput #"Mute volume output"
bindl = , XF86AudioMicMute, exec, $volume muteInput #"Mute volume input"
bindel = , XF86MonBrightnessUp, exec, $brightness increase #"Increase brightness"
bindel = , XF86MonBrightnessDown, exec, $brightness decrease #"Decrease brightness"
bindl = , XF86AudioPlayPause, exec, $media pause #"Play/Pause"
bindl = , XF86AudioPause, exec, $media pause #"Pause"
bindl = , XF86AudioPlay, exec, $media play #"Play"
bindl = , XF86AudioNext, exec, $media next #"Next"
bindl = , XF86AudioPrev, exec, $media previous #"Previous"
bindl = , XF86AudioStop, exec, $media stop #"Stop"
bindl = , XF86Lock, exec, $lockScreen lock #"Lock screen"
bindl = , XF86Sleep, exec, systemctl suspend #"Suspend"
bindl = , XF86Rfkill, exec, $toggleAirplaneMode #"Toggle airplane mode"
bind = , XF86Calculator, exec, qalculate-gtk #"Calculator"
bind = , Print, exec, $screenshot --edit #"Screenshot (edit)"

#2.Window management
binde = $superMod SHIFT, C, killactive, #"Close active window"
binde = $superMod SHIFT, X, forcekillactive, #"Force kill active window"
bind = $superMod SHIFT, R, exec, $refresh #"Reload hyprland"
bind = $superMod, F, exec, $toggleFloating #"Toggle floating"
bind = $superMod SHIFT, F, exec, $toggleAllFloating #"Toggle all windows floating"
bind = $superMod, SPACE, fullscreenstate, 2, -1 #"Make window fullscreen"
bind = $superMod SHIFT, SPACE, fullscreenstate, 1, -1 #"Make window fake fullscreen"

binde = $superMod, J, layoutmsg, cyclenext #"Focus next window"
binde = $superMod, K, layoutmsg, cycleprev #"Focus prev window"
binde = $superMod SHIFT, J, layoutmsg, swapnext #"Swap with next window"
binde = $superMod SHIFT, K, layoutmsg, swapprev #"Swap with prev window"
bind = $superMod SHIFT, M, layoutmsg, swapwithmaster #"Swap with master window"

binde = $superMod, H, resizeactive, -50 0 #"Resize window left"
binde = $superMod, L, resizeactive, 50 0 #"Resize window right"
bind = $superMod, E, layoutmsg, mfact exact 0.5 #"Resize split ratio"

bind = $superMod, equal, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')" #"Cursor zoom in"
bind = $superMod, minus, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')" #"Cursor zoom out"
bind = $superMod CTRL, 0, exec, hyprctl keyword cursor:zoom_factor 1.0 #"Reset cursor zoom"

bind = $superMod, W, exec, $toggleFloatTileFocus #"Toggle float/tile focus"
bind = $superMod, Tab, cyclenext, floating #"Cycle floating windows"
bind = $superMod, Tab, alterzorder, top

bind = $superMod CTRL, S, togglespecialworkspace #"Toggle special workspace"
bind = $superMod CTRL SHIFT, S, movetoworkspace, special #"Move window to special workspace"

bind = $superMod, G, togglegroup #"Toggle window group"
bind = $superMod CTRL, tab, changegroupactive, f #"Focus next group window"
bind = $superMod CTRL SHIFT, tab, changegroupactive, b #"Focus prev group window"

bind = $superMod, 1, focusworkspaceoncurrentmonitor, 1 #"Switch to workspace 1"
bind = $superMod, 2, focusworkspaceoncurrentmonitor, 2 #"Switch to workspace 2"
bind = $superMod, 3, focusworkspaceoncurrentmonitor, 3 #"Switch to workspace 3"
bind = $superMod, 4, focusworkspaceoncurrentmonitor, 4 #"Switch to workspace 4"
bind = $superMod, 5, focusworkspaceoncurrentmonitor, 5 #"Switch to workspace 5"
bind = $superMod, 6, focusworkspaceoncurrentmonitor, 6 #"Switch to workspace 6"
bind = $superMod, 7, focusworkspaceoncurrentmonitor, 7 #"Switch to workspace 7"
bind = $superMod, 8, focusworkspaceoncurrentmonitor, 8 #"Switch to workspace 8"
bind = $superMod, 9, focusworkspaceoncurrentmonitor, 9 #"Switch to workspace 9"
bind = $superMod, 0, focusworkspaceoncurrentmonitor, 10 #"Switch to workspace 10"

bind = $superMod SHIFT, 1, movetoworkspacesilent, 1 #"Move window to workspace 1"
bind = $superMod SHIFT, 2, movetoworkspacesilent, 2 #"Move window to workspace 2"
bind = $superMod SHIFT, 3, movetoworkspacesilent, 3 #"Move window to workspace 3"
bind = $superMod SHIFT, 4, movetoworkspacesilent, 4 #"Move window to workspace 4"
bind = $superMod SHIFT, 5, movetoworkspacesilent, 5 #"Move window to workspace 5"
bind = $superMod SHIFT, 6, movetoworkspacesilent, 6 #"Move window to workspace 6"
bind = $superMod SHIFT, 7, movetoworkspacesilent, 7 #"Move window to workspace 7"
bind = $superMod SHIFT, 8, movetoworkspacesilent, 8 #"Move window to workspace 8"
bind = $superMod SHIFT, 9, movetoworkspacesilent, 9 #"Move window to workspace 9"
bind = $superMod SHIFT, 0, movetoworkspacesilent, 10 #"Move window to workspace 10"

bind = $superMod CTRL SHIFT, 1, movetoworkspace, 1 #"Move window and follow to workspace 1"
bind = $superMod CTRL SHIFT, 2, movetoworkspace, 2 #"Move window and follow to workspace 2"
bind = $superMod CTRL SHIFT, 3, movetoworkspace, 3 #"Move window and follow to workspace 3"
bind = $superMod CTRL SHIFT, 4, movetoworkspace, 4 #"Move window and follow to workspace 4"
bind = $superMod CTRL SHIFT, 5, movetoworkspace, 5 #"Move window and follow to workspace 5"
bind = $superMod CTRL SHIFT, 6, movetoworkspace, 6 #"Move window and follow to workspace 6"
bind = $superMod CTRL SHIFT, 7, movetoworkspace, 7 #"Move window and follow to workspace 7"
bind = $superMod CTRL SHIFT, 8, movetoworkspace, 8 #"Move window and follow to workspace 8"
bind = $superMod CTRL SHIFT, 9, movetoworkspace, 9 #"Move window and follow to workspace 9"
bind = $superMod CTRL SHIFT, 0, movetoworkspace, 10 #"Move window and follow to workspace 10"

bindm = $superMod, mouse:272, movewindow #"Move window with mouse"
bindm = $superMod, mouse:273, resizewindow #"Resize window with mouse"

bind = $superMod CTRL, M, focusmonitor, +1 #"Cycle monitor focus"
bind = $superMod CTRL SHIFT, M, movewindow, mon:+1 #"Cycle window to monitor"

#3.Frequent Actions
bind = $superMod, RETURN, exec, $terminal #"Open terminal"
bind = $superMod, SLASH, exec, $toggleLauncher #"Toggle app launcher"
bind = $superMod SHIFT, SLASH, exec, $ipc plugin:keybind-cheatsheet toggle #"Toggle keybind cheatsheet"
bind = $superMod, Q, exec, $lockScreen #"Open lock screen"
bind = $superMod SHIFT, Q, exec, $toggleSessionMenu #"Toggle session menu"
bind = $superMod, COMMA, exec, $toggleSystemSettings #"Open system settings"

#4.Apps
bind = $superMod, A, submap, Apps #"Open Apps"
submap = Apps
bind = , B, exec, $submapReset && $browser #"Open browser"
bind = , C, exec, $submapReset && $codeEditor #"Open editor"
bind = , F, exec, $submapReset && $fileManager #"Open file manager"
bind = , M, exec, $submapReset && $messagingApp #"Open messaging app"
bind = , S, exec, $submapReset && $songApp #"Open song app"
bind = , ESCAPE, submap, reset
submap = reset

#5.Utilities
bind = $superMod, U, submap, Utilities #"Open/Toggle Utilities"
submap = Utilities
bind = , A, exec, $submapReset && $toggleAudioControl #"Toggle audio control"
bind = , B, exec, $submapReset && $toggleBluetoothManager #"Toggle bluetooth control"
bind = , C, exec, $submapReset && $colorPicker #"Open color picker"
bind = , I, exec, $submapReset && $toggleIdleInhibitor #"Toggle idle inhibitor"
bind = , K, exec, $submapReset && $toggleShowKeys #"Toggle show keys"
bind = , M, exec, $submapReset && $toggleMechSound #"Toggle mechanical sound"
bind = , N, exec, $submapReset && $toggleNetworkPanel #"Toggle network control"
bind = , O, exec, $submapReset && $OCRSelect #"Open ocr select"
bind = , V, exec, $submapReset && $toggleVideoRecording #"Toggle video recording"
bind = , W, exec, $submapReset && $toggleWallpaperPicker #"Toggle wallpaper picker"
bind = SHIFT, M, exec, $submapReset && $toggleSystemMonitor #"Toggle system monitor"
bind = SHIFT, N, exec, $submapReset && $toggleNotificationPanel #"Toggle notification control"
bind = , ESCAPE, submap, reset
submap = reset

#6.Volume
bind = $superMod, V, submap, Volume #"Volume controls"
submap = Volume
binde = , I, exec, $volume increase #"Increase volume"
binde = , D, exec, $volume decrease #"Decrease volume"
binde = , M, exec, $volume muteInput #"Mute volume input"
binde = SHIFT, M, exec, $volume muteOutput #"Mute volume ouput"
bind = , ESCAPE, submap, reset
submap = reset

#7.Brightness
bind = $superMod, B, submap, Brightness #"Brightness controls"
submap = Brightness
binde = , I, exec, $brightness increase #"Increase brightness"
binde = , D, exec, $brightness decrease #"Decrease brightness"
bind = , ESCAPE, submap, reset
submap = reset

#8.Media
bind = $superMod, M, submap, Media #"Media controls"
submap = Media
bind = , N, exec, $submapReset && $media next #"Next track"
bind = , P, exec, $submapReset && $media previous #"Previous track"
bind = , SPACE, exec, $submapReset && $media playPause #"Play/Pause"
bind = , S, exec, $submapReset && $media stop #"Stop"
bind = , O, exec, $submapReset && $media toggle #"Toggle player"
bind = , escape, submap, reset
submap = reset

#9.Screenshot
bind = $superMod, S, submap, Screenshot #"Screenshot controls"
submap = Screenshot
bind = , A, exec, $submapReset && $screenshot --active --copy #"Active (copy)"
bind = SHIFT, A, exec, $submapReset && $screenshot --active #"Active (save)"
bind = , S, exec, $submapReset && $screenshot --select --copy #"Select (copy)"
bind = SHIFT, S, exec, $submapReset && $screenshot --select #"Select (save)"
bind = , E, exec, $submapReset && $screenshot --edit #"Edit screenshot"
bind = , F, exec, $submapReset && $screenshot --fullscreen --copy #"Fullscreen (copy)"
bind = SHIFT, F, exec, $submapReset && $screenshot --fullscreen #"Fullscreen (save)"
bind = , escape, submap, reset
submap = reset

bindl=,switch:Lid Switch, exec, ~/.config/hypr/scripts/lid-switch.sh
